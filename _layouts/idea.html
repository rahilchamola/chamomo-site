---
layout: default
---
<article class="idea-full">
  <header class="idea-header">
    <div class="idea-meta-top">
      <span class="badge badge--idea badge--{{ page.status }}">{{ page.status }}</span>
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%B %d, %Y" }}
      </time>
    </div>

    <h1 class="idea-title">{{ page.title }}</h1>
  </header>

  <div class="idea-content prose">
    {{ content }}
  </div>

  {% if page.tags.size > 0 %}
  <footer class="idea-footer">
    <div class="post-tags">
      {% for tag in page.tags %}
      <a href="/tags/#{{ tag }}" class="tag">#{{ tag }}</a>
      {% endfor %}
    </div>
  </footer>
  {% endif %}
</article>
