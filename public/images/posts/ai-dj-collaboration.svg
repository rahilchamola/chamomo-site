<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a2e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <!-- Large background blobs for depth (purple, low opacity) -->
  <circle cx="250" cy="200" r="200" fill="#a855f7" opacity="0.04"/>
  <circle cx="1000" cy="550" r="190" fill="#a855f7" opacity="0.05"/>
  <ellipse cx="600" cy="100" rx="280" ry="180" fill="#a855f7" opacity="0.03"/>
  <!-- Neural network nodes and connections -->
  <g stroke="#a855f7" stroke-width="0.8" fill="none" opacity="0.2">
    <!-- Left network -->
    <line x1="80" y1="150" x2="150" y2="200"/>
    <line x1="80" y1="150" x2="120" y2="100"/>
    <line x1="150" y1="200" x2="220" y2="180"/>
    <line x1="150" y1="200" x2="200" y2="280"/>
    <line x1="80" y1="150" x2="180" y2="280"/>
    <!-- Center-left network -->
    <line x1="350" y1="100" x2="450" y2="150"/>
    <line x1="450" y1="150" x2="500" y2="100"/>
    <line x1="350" y1="100" x2="500" y2="200"/>
    <line x1="450" y1="150" x2="520" y2="220"/>
    <!-- Center network -->
    <line x1="550" y1="350" x2="650" y2="380"/>
    <line x1="650" y1="380" x2="700" y2="320"/>
    <line x1="550" y1="350" x2="700" y2="420"/>
    <line x1="600" y1="450" x2="650" y2="380"/>
    <!-- Right-center network -->
    <line x1="800" y1="200" x2="900" y2="250"/>
    <line x1="900" y1="250" x2="950" y2="200"/>
    <line x1="800" y1="200" x2="950" y2="300"/>
    <line x1="900" y1="250" x2="1000" y2="320"/>
    <!-- Right network -->
    <line x1="1000" y1="450" x2="1100" y2="500"/>
    <line x1="1100" y1="500" x2="1150" y2="480"/>
    <line x1="1000" y1="450" x2="1100" y2="580"/>
    <line x1="1100" y1="500" x2="1050" y2="580"/>
  </g>
  <!-- Node circles (foreground, more visible) -->
  <g fill="#a855f7" opacity="0.5">
    <!-- Left cluster -->
    <circle cx="80" cy="150" r="4"/>
    <circle cx="150" cy="200" r="4"/>
    <circle cx="120" cy="100" r="3"/>
    <circle cx="220" cy="180" r="3"/>
    <circle cx="200" cy="280" r="3"/>
    <circle cx="180" cy="280" r="3"/>
    <!-- Center-left cluster -->
    <circle cx="350" cy="100" r="4"/>
    <circle cx="450" cy="150" r="4"/>
    <circle cx="500" cy="100" r="3"/>
    <circle cx="500" cy="200" r="3"/>
    <circle cx="520" cy="220" r="3"/>
    <!-- Center cluster -->
    <circle cx="550" cy="350" r="4"/>
    <circle cx="650" cy="380" r="4"/>
    <circle cx="700" cy="320" r="4"/>
    <circle cx="700" cy="420" r="3"/>
    <circle cx="600" cy="450" r="3"/>
    <!-- Right-center cluster -->
    <circle cx="800" cy="200" r="4"/>
    <circle cx="900" cy="250" r="4"/>
    <circle cx="950" cy="200" r="3"/>
    <circle cx="950" cy="300" r="3"/>
    <circle cx="1000" cy="320" r="3"/>
    <!-- Right cluster -->
    <circle cx="1000" cy="450" r="4"/>
    <circle cx="1100" cy="500" r="4"/>
    <circle cx="1150" cy="480" r="3"/>
    <circle cx="1100" cy="580" r="3"/>
    <circle cx="1050" cy="580" r="3"/>
  </g>
  <!-- Additional scattered nodes -->
  <g fill="#a855f7" opacity="0.35">
    <circle cx="400" cy="350" r="2"/>
    <circle cx="850" cy="100" r="2"/>
    <circle cx="300" cy="500" r="2"/>
    <circle cx="750" cy="550" r="2"/>
  </g>
  <!-- Watermark -->
  <text x="600" y="600" font-family="monospace" font-size="14" fill="#a855f7" opacity="0.3" text-anchor="middle">chamomo</text>
</svg>