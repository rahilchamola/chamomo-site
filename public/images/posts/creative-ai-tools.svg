<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a2e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <!-- Large background blobs for depth (purple, low opacity) -->
  <circle cx="300" cy="250" r="200" fill="#a855f7" opacity="0.04"/>
  <circle cx="900" cy="450" r="180" fill="#a855f7" opacity="0.05"/>
  <ellipse cx="600" cy="150" rx="250" ry="200" fill="#a855f7" opacity="0.03"/>
  <!-- Neural network nodes and connections -->
  <g stroke="#a855f7" stroke-width="0.8" fill="none" opacity="0.2">
    <!-- Top left network -->
    <line x1="100" y1="100" x2="200" y2="180"/>
    <line x1="100" y1="100" x2="180" y2="100"/>
    <line x1="200" y1="180" x2="250" y2="150"/>
    <line x1="200" y1="180" x2="280" y2="220"/>
    <line x1="100" y1="100" x2="150" y2="200"/>
    <!-- Top right network -->
    <line x1="950" y1="80" x2="1050" y2="120"/>
    <line x1="950" y1="80" x2="1000" y2="50"/>
    <line x1="1050" y1="120" x2="1100" y2="100"/>
    <line x1="950" y1="80" x2="1100" y2="150"/>
    <!-- Bottom left network -->
    <line x1="150" y1="500" x2="250" y2="550"/>
    <line x1="150" y1="500" x2="180" y2="600"/>
    <line x1="250" y1="550" x2="320" y2="580"/>
    <!-- Center network -->
    <line x1="500" y1="250" x2="600" y2="300"/>
    <line x1="600" y1="300" x2="700" y2="250"/>
    <line x1="500" y1="250" x2="650" y2="350"/>
    <line x1="700" y1="250" x2="620" y2="380"/>
    <!-- Bottom right network -->
    <line x1="850" y1="450" x2="950" y2="500"/>
    <line x1="950" y1="500" x2="1050" y2="480"/>
    <line x1="850" y1="450" x2="1000" y2="550"/>
  </g>
  <!-- Node circles (foreground, more visible) -->
  <g fill="#a855f7" opacity="0.5">
    <!-- Top left cluster -->
    <circle cx="100" cy="100" r="4"/>
    <circle cx="200" cy="180" r="4"/>
    <circle cx="180" cy="100" r="3"/>
    <circle cx="250" cy="150" r="3"/>
    <circle cx="280" cy="220" r="3"/>
    <circle cx="150" cy="200" r="3"/>
    <!-- Top right cluster -->
    <circle cx="950" cy="80" r="4"/>
    <circle cx="1050" cy="120" r="4"/>
    <circle cx="1000" cy="50" r="3"/>
    <circle cx="1100" cy="100" r="3"/>
    <circle cx="1100" cy="150" r="3"/>
    <!-- Center cluster -->
    <circle cx="500" cy="250" r="4"/>
    <circle cx="600" cy="300" r="4"/>
    <circle cx="700" cy="250" r="4"/>
    <circle cx="650" cy="350" r="3"/>
    <circle cx="620" cy="380" r="3"/>
    <!-- Bottom left cluster -->
    <circle cx="150" cy="500" r="4"/>
    <circle cx="250" cy="550" r="4"/>
    <circle cx="180" cy="600" r="3"/>
    <circle cx="320" cy="580" r="3"/>
    <!-- Bottom right cluster -->
    <circle cx="850" cy="450" r="4"/>
    <circle cx="950" cy="500" r="4"/>
    <circle cx="1050" cy="480" r="3"/>
    <circle cx="1000" cy="550" r="3"/>
  </g>
  <!-- Additional scattered nodes for richness -->
  <g fill="#a855f7" opacity="0.35">
    <circle cx="350" cy="350" r="2"/>
    <circle cx="700" cy="450" r="2"/>
    <circle cx="400" cy="80" r="2"/>
    <circle cx="800" cy="600" r="2"/>
  </g>
  <!-- Watermark -->
  <text x="600" y="600" font-family="monospace" font-size="14" fill="#a855f7" opacity="0.3" text-anchor="middle">chamomo</text>
</svg>