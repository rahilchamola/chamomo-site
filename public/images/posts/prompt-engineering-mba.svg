<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a2e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <!-- Large background blobs for depth (purple, low opacity) -->
  <circle cx="200" cy="350" r="210" fill="#a855f7" opacity="0.04"/>
  <circle cx="1050" cy="150" r="190" fill="#a855f7" opacity="0.05"/>
  <ellipse cx="600" cy="100" rx="300" ry="200" fill="#a855f7" opacity="0.03"/>
  <!-- Neural network nodes and connections -->
  <g stroke="#a855f7" stroke-width="0.8" fill="none" opacity="0.2">
    <!-- Left network -->
    <line x1="70" y1="200" x2="140" y2="260"/>
    <line x1="70" y1="200" x2="130" y2="150"/>
    <line x1="140" y1="260" x2="210" y2="240"/>
    <line x1="140" y1="260" x2="190" y2="330"/>
    <line x1="70" y1="200" x2="200" y2="340"/>
    <!-- Upper-center network -->
    <line x1="400" y1="80" x2="500" y2="130"/>
    <line x1="500" y1="130" x2="560" y2="80"/>
    <line x1="400" y1="80" x2="560" y2="180"/>
    <line x1="500" y1="130" x2="580" y2="200"/>
    <!-- Center network -->
    <line x1="600" y1="350" x2="700" y2="400"/>
    <line x1="700" y1="400" x2="750" y2="350"/>
    <line x1="600" y1="350" x2="750" y2="450"/>
    <line x1="700" y1="400" x2="800" y2="480"/>
    <!-- Upper-right network -->
    <line x1="850" y1="120" x2="950" y2="170"/>
    <line x1="950" y1="170" x2="1020" y2="130"/>
    <line x1="850" y1="120" x2="1020" y2="220"/>
    <line x1="950" y1="170" x2="1000" y2="250"/>
    <!-- Right network -->
    <line x1="1050" y1="450" x2="1150" y2="500"/>
    <line x1="1150" y1="500" x2="1180" y2="450"/>
    <line x1="1050" y1="450" x2="1150" y2="580"/>
  </g>
  <!-- Node circles (foreground) -->
  <g fill="#a855f7" opacity="0.5">
    <!-- Left cluster -->
    <circle cx="70" cy="200" r="4"/>
    <circle cx="140" cy="260" r="4"/>
    <circle cx="130" cy="150" r="3"/>
    <circle cx="210" cy="240" r="3"/>
    <circle cx="190" cy="330" r="3"/>
    <circle cx="200" cy="340" r="3"/>
    <!-- Upper-center cluster -->
    <circle cx="400" cy="80" r="4"/>
    <circle cx="500" cy="130" r="4"/>
    <circle cx="560" cy="80" r="3"/>
    <circle cx="560" cy="180" r="3"/>
    <circle cx="580" cy="200" r="3"/>
    <!-- Center cluster -->
    <circle cx="600" cy="350" r="4"/>
    <circle cx="700" cy="400" r="4"/>
    <circle cx="750" cy="350" r="4"/>
    <circle cx="750" cy="450" r="3"/>
    <circle cx="800" cy="480" r="3"/>
    <!-- Upper-right cluster -->
    <circle cx="850" cy="120" r="4"/>
    <circle cx="950" cy="170" r="4"/>
    <circle cx="1020" cy="130" r="3"/>
    <circle cx="1020" cy="220" r="3"/>
    <circle cx="1000" cy="250" r="3"/>
    <!-- Right cluster -->
    <circle cx="1050" cy="450" r="4"/>
    <circle cx="1150" cy="500" r="4"/>
    <circle cx="1180" cy="450" r="3"/>
    <circle cx="1150" cy="580" r="3"/>
  </g>
  <!-- Additional scattered nodes for richness -->
  <g fill="#a855f7" opacity="0.35">
    <circle cx="380" cy="420" r="2"/>
    <circle cx="750" cy="200" r="2"/>
    <circle cx="450" cy="500" r="2"/>
    <circle cx="920" cy="450" r="2"/>
  </g>
  <!-- Watermark -->
  <text x="600" y="600" font-family="monospace" font-size="14" fill="#a855f7" opacity="0.3" text-anchor="middle">chamomo</text>
</svg>