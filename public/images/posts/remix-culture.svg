<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a2e;stop-opacity:1" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <!-- Large background blobs for depth (pink, low opacity) -->
  <circle cx="300" cy="150" r="220" fill="#f472b6" opacity="0.04"/>
  <circle cx="950" cy="450" r="200" fill="#f472b6" opacity="0.05"/>
  <ellipse cx="600" cy="700" rx="350" ry="250" fill="#f472b6" opacity="0.03"/>
  <!-- Flowing organic curves - sine waves -->
  <g stroke="#f472b6" stroke-width="2" fill="none" opacity="0.3" filter="url(#blur)">
    <path d="M 0 150 Q 150 100, 300 150 T 600 150 T 900 150 T 1200 150"/>
    <path d="M 0 220 Q 150 170, 300 220 T 600 220 T 900 220 T 1200 220"/>
    <path d="M 0 300 Q 150 250, 300 300 T 600 300 T 900 300 T 1200 300"/>
  </g>
  <!-- Flowing curves from bottom -->
  <g stroke="#f472b6" stroke-width="2.5" fill="none" opacity="0.25" filter="url(#blur)">
    <path d="M 0 450 Q 200 380, 400 450 T 800 450 T 1200 450"/>
    <path d="M 0 520 Q 200 460, 400 520 T 800 520 T 1200 520"/>
  </g>
  <!-- Paint splash-like organic shapes -->
  <g fill="#f472b6" opacity="0.15" filter="url(#blur)">
    <!-- Top left splash -->
    <circle cx="150" cy="100" r="45"/>
    <circle cx="180" cy="80" r="35"/>
    <circle cx="120" cy="120" r="38"/>
    <!-- Center splash -->
    <circle cx="600" cy="450" r="50"/>
    <circle cx="630" cy="420" r="40"/>
    <circle cx="570" cy="480" r="42"/>
    <!-- Right splash -->
    <circle cx="1000" cy="200" r="48"/>
    <circle cx="1040" cy="170" r="35"/>
    <circle cx="960" cy="230" r="40"/>
  </g>
  <!-- Curved flowing lines -->
  <g stroke="#f472b6" stroke-width="1.5" fill="none" opacity="0.2">
    <path d="M 100 50 Q 300 200, 250 400"/>
    <path d="M 950 100 Q 800 300, 900 550"/>
    <path d="M 1100 300 Q 950 450, 1000 600"/>
    <path d="M 50 350 Q 250 450, 400 380"/>
  </g>
  <!-- Additional organic curves (swooshes) -->
  <g stroke="#f472b6" stroke-width="2" fill="none" opacity="0.22" filter="url(#blur)">
    <path d="M 200 500 Q 400 550, 500 480"/>
    <path d="M 750 100 Q 850 150, 800 220"/>
    <path d="M 350 350 Q 450 320, 500 380"/>
  </g>
  <!-- Accent dots scattered for artistic feel -->
  <g fill="#f472b6" opacity="0.35">
    <circle cx="300" cy="150" r="2"/>
    <circle cx="600" cy="100" r="2"/>
    <circle cx="900" cy="280" r="2"/>
    <circle cx="200" cy="450" r="2"/>
    <circle cx="1000" cy="550" r="2"/>
    <circle cx="500" cy="350" r="2"/>
    <circle cx="800" cy="450" r="2"/>
  </g>
  <!-- Watermark -->
  <text x="600" y="600" font-family="monospace" font-size="14" fill="#f472b6" opacity="0.3" text-anchor="middle">chamomo</text>
</svg>