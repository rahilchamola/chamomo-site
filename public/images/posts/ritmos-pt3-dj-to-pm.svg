<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-ritmos-pt3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A0A14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D1020;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-ritmos-pt3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D946A8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4179D;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg-ritmos-pt3)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#D946A8" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/><line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/><line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/><line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/><line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/><line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/><line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/><line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="540" x2="1200" y2="540"/><line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Glowing orbs -->
  <circle cx="260" cy="140" r="120" fill="#D946A8" opacity="0.06" filter="url(#glow)"/>
  <circle cx="940" cy="480" r="170" fill="#C4179D" opacity="0.05" filter="url(#glow)"/>

  <!-- Large part number -->
  <text x="600" y="320" text-anchor="middle" font-family="monospace" font-size="220" font-weight="900" fill="url(#accent-ritmos-pt3)" opacity="0.07" filter="url(#glow)">3</text>

  <!-- Waveform morphing into product roadmap/kanban -->
  <g transform="translate(600,240)" filter="url(#glow-sm)">
    <!-- Left side: energy arc (DJ side) -->
    <path d="M -60,10 Q -40,-30 -10,-38" fill="none" stroke="url(#accent-ritmos-pt3)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="-60" cy="10" r="3" fill="#D946A8" opacity="0.8"/>
    <circle cx="-10" cy="-38" r="3" fill="#D946A8" opacity="0.9"/>

    <!-- Transition flow in the middle -->
    <path d="M 0,-35 L 15,-25" stroke="#D946A8" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <polygon points="15,-25 12,-22 18,-28" fill="#D946A8" opacity="0.7"/>

    <!-- Right side: kanban/roadmap blocks (PM side) -->
    <!-- Block 1 (top) -->
    <rect x="25" y="-40" width="22" height="16" rx="2" fill="none" stroke="#D946A8" stroke-width="1.2" opacity="0.8"/>
    <line x1="25" y1="-32" x2="47" y2="-32" stroke="#D946A8" stroke-width="0.8" opacity="0.6"/>

    <!-- Block 2 (middle) -->
    <rect x="25" y="-20" width="22" height="16" rx="2" fill="none" stroke="#D946A8" stroke-width="1.2" opacity="0.7"/>
    <line x1="25" y1="-12" x2="47" y2="-12" stroke="#D946A8" stroke-width="0.8" opacity="0.5"/>

    <!-- Block 3 (bottom) -->
    <rect x="25" y="0" width="22" height="16" rx="2" fill="none" stroke="#D946A8" stroke-width="1.2" opacity="0.6"/>
    <line x1="25" y1="8" x2="47" y2="8" stroke="#D946A8" stroke-width="0.8" opacity="0.4"/>

    <!-- Vertical connection line -->
    <line x1="47" y1="-32" x2="60" y2="-32" stroke="#D946A8" stroke-width="1" opacity="0.5"/>
    <line x1="47" y1="-12" x2="60" y2="-12" stroke="#D946A8" stroke-width="1" opacity="0.5"/>
    <line x1="47" y1="8" x2="60" y2="8" stroke="#D946A8" stroke-width="1" opacity="0.5"/>

    <!-- Glow around transition -->
    <circle cx="0" cy="-35" r="6" fill="none" stroke="#D946A8" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Part badge -->
  <g transform="translate(600,330)">
    <rect x="-32" y="-14" width="64" height="28" rx="14" fill="#D946A8" opacity="0.15"/>
    <text x="0" y="5" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#D946A8">PT.3</text>
  </g>

  <!-- Title -->
  <text x="600" y="405" text-anchor="middle" font-family="monospace" font-size="64" font-weight="800" fill="#D946A8">DJ → PM</text>
  <text x="600" y="442" text-anchor="middle" font-family="monospace" font-size="20" fill="#71717a" letter-spacing="4">WHAT THE BOOTH TAUGHT ME</text>

  <!-- Bottom bar -->
  <g transform="translate(0,565)">
    <rect width="1200" height="65" fill="#1A0A14" opacity="0.85"/>
    <rect width="1200" height="1" fill="#D946A8" opacity="0.15"/>
    <text x="120" y="38" text-anchor="middle" font-family="monospace" font-size="12" fill="#D946A8">RITMOS</text>
    <text x="320" y="38" text-anchor="middle" font-family="monospace" font-size="12" fill="#D946A8" opacity="0.7">BUILDING IN PUBLIC</text>
    <text x="600" y="38" text-anchor="middle" font-family="monospace" font-size="12" fill="#D946A8" opacity="0.5">PART 3 OF 3</text>
    <text x="880" y="38" text-anchor="middle" font-family="monospace" font-size="12" fill="#D946A8" opacity="0.7">5 LESSONS</text>
    <text x="1080" y="38" text-anchor="middle" font-family="monospace" font-size="12" fill="#D946A8" opacity="0.5">VIBE-CODED</text>
  </g>
</svg>