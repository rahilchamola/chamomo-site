<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1A14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#102D20;stop-opacity:1" />
    </linearGradient>

    <radialGradient id="accentGlow">
      <stop offset="0%" style="stop-color:#3EAE7C;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3EAE7C;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Grid pattern -->
  <g stroke="#3EAE7C" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="0" x2="1200" y2="0"/>
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="550" x2="1200" y2="550"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>

    <line x1="0" y1="0" x2="0" y2="630"/>
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
    <line x1="1200" y1="0" x2="1200" y2="630"/>
  </g>

  <!-- Faded background text -->
  <text x="600" y="380" font-family="monospace" font-size="280" font-weight="bold" fill="#3EAE7C" opacity="0.07" text-anchor="middle" dominant-baseline="middle">2</text>

  <!-- Floating accent circles -->
  <circle cx="1000" cy="100" r="180" fill="url(#accentGlow)" opacity="0.6"/>
  <circle cx="200" cy="500" r="150" fill="url(#accentGlow)" opacity="0.4"/>
  <circle cx="900" cy="550" r="120" fill="url(#accentGlow)" opacity="0.3"/>

  <!-- Central icon: Two connected neural nodes -->
  <g transform="translate(600, 260)" filter="url(#glow)">
    <!-- Left node: Antenna/retrieval -->
    <circle cx="-50" cy="0" r="35" fill="none" stroke="#3EAE7C" stroke-width="2.5" opacity="0.9"/>
    <circle cx="-50" cy="0" r="12" fill="#3EAE7C" opacity="0.9"/>

    <!-- Antenna lines from left node -->
    <line x1="-50" y1="-40" x2="-65" y2="-60" stroke="#3EAE7C" stroke-width="2" opacity="0.7"/>
    <line x1="-50" y1="-40" x2="-35" y2="-65" stroke="#3EAE7C" stroke-width="2" opacity="0.7"/>
    <line x1="-50" y1="-40" x2="-50" y2="-65" stroke="#3EAE7C" stroke-width="2" opacity="0.7"/>

    <!-- Right node: Brain/classification -->
    <circle cx="50" cy="0" r="35" fill="none" stroke="#3EAE7C" stroke-width="2.5" opacity="0.9"/>
    <circle cx="50" cy="0" r="12" fill="#3EAE7C" opacity="0.9"/>

    <!-- Brain lobes from right node -->
    <circle cx="40" cy="-25" r="10" fill="none" stroke="#3EAE7C" stroke-width="2" opacity="0.7"/>
    <circle cx="60" cy="-25" r="10" fill="none" stroke="#3EAE7C" stroke-width="2" opacity="0.7"/>

    <!-- Connection between nodes -->
    <line x1="-15" y1="0" x2="15" y2="0" stroke="#3EAE7C" stroke-width="2.5" opacity="0.8"/>
    <circle cx="0" cy="0" r="5" fill="#3EAE7C" opacity="0.6"/>

    <!-- Glow rings -->
    <circle cx="-50" cy="0" r="50" fill="none" stroke="#3EAE7C" stroke-width="1" opacity="0.2"/>
    <circle cx="50" cy="0" r="50" fill="none" stroke="#3EAE7C" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- PT.X Badge -->
  <g transform="translate(600, 360)">
    <rect x="-45" y="-18" width="90" height="36" rx="18" fill="#3EAE7C" opacity="0.15" stroke="#3EAE7C" stroke-width="1.5"/>
    <text x="0" y="0" font-family="monospace" font-size="16" font-weight="bold" fill="#3EAE7C" text-anchor="middle" dominant-baseline="middle">PT.2</text>
  </g>

  <!-- Title -->
  <text x="600" y="440" font-family="monospace" font-size="64" font-weight="bold" fill="#3EAE7C" text-anchor="middle">HOW IT THINKS</text>

  <!-- Subtitle -->
  <text x="600" y="480" font-family="monospace" font-size="20" fill="#71717a" text-anchor="middle" letter-spacing="4">TWO-PASS ARCHITECTURE</text>

  <!-- Bottom metadata bar -->
  <rect x="0" y="550" width="1200" height="80" fill="#0A0F0B" opacity="0.8"/>
  <g font-family="monospace" font-size="16" fill="#3EAE7C" text-anchor="middle" dominant-baseline="middle">
    <text x="150" y="590">SOPHIS</text>
    <text x="400" y="590">BUILDING IN PUBLIC</text>
    <text x="600" y="590">PART 2 OF 3</text>
    <text x="800" y="590">2 AI PASSES</text>
    <text x="1050" y="590">VIBE-CODED</text>
  </g>
</svg>