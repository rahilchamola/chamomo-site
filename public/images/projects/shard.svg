<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a1a" />
      <stop offset="100%" style="stop-color:#0a1220" />
    </linearGradient>
    <linearGradient id="glowP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8" />
      <stop offset="50%" style="stop-color:#c084fc" />
      <stop offset="100%" style="stop-color:#ec4899" />
    </linearGradient>
    <filter id="bP"><feGaussianBlur stdDeviation="80"/></filter>
    <filter id="bP2"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bgP)"/>
  <circle cx="600" cy="315" r="280" fill="#818cf8" opacity="0.03" filter="url(#bP)"/>
  <circle cx="300" cy="500" r="160" fill="#c084fc" opacity="0.03" filter="url(#bP)"/>
  <circle cx="900" cy="150" r="160" fill="#ec4899" opacity="0.03" filter="url(#bP)"/>
  <!-- Central shard/diamond shape -->
  <g transform="translate(600,280)">
    <polygon points="0,-120 70,0 0,140 -70,0" fill="none" stroke="url(#glowP)" stroke-width="1.5" opacity="0.3"/>
    <polygon points="0,-80 46,0 0,95 -46,0" fill="none" stroke="url(#glowP)" stroke-width="1" opacity="0.15"/>
    <!-- Inner glow -->
    <circle cx="0" cy="10" r="30" fill="#818cf8" opacity="0.06" filter="url(#bP2)"/>
  </g>
  <!-- Floating code fragments -->
  <g opacity="0.15" font-family="monospace" font-size="16" fill="#a5b4fc">
    <text x="120" y="180">interface NPC { memory: Memory[] }</text>
    <text x="800" y="200">type Effect = Combat | Social | World</text>
    <text x="150" y="420">relationship.axes.map(evolve)</text>
    <text x="780" y="440">coherenceStack.validate(state)</text>
  </g>
  <!-- Stats row -->
  <g transform="translate(200,500)" opacity="0.4">
    <text x="0" y="0" font-family="monospace" font-size="18" fill="#818cf8">134K LOC</text>
    <text x="150" y="0" font-family="monospace" font-size="18" fill="#71717a">·</text>
    <text x="180" y="0" font-family="monospace" font-size="18" fill="#c084fc">21 worlds</text>
    <text x="330" y="0" font-family="monospace" font-size="18" fill="#71717a">·</text>
    <text x="360" y="0" font-family="monospace" font-size="18" fill="#ec4899">14 versions</text>
    <text x="520" y="0" font-family="monospace" font-size="18" fill="#71717a">·</text>
    <text x="550" y="0" font-family="monospace" font-size="18" fill="#34d399">54+ effects</text>
  </g>
  <!-- Title -->
  <text x="600" y="560" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#52525b" letter-spacing="0.15em" text-transform="uppercase">AI NARRATIVE RPG ENGINE</text>
  <!-- Logo text -->
  <text x="600" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="68" fill="#f4f4f5" font-weight="800" letter-spacing="-0.02em">SHARD</text>
</svg>