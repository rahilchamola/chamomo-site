<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1A14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#102D20;stop-opacity:1" />
    </linearGradient>

    <radialGradient id="accentGlow">
      <stop offset="0%" style="stop-color:#3EAE7C;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3EAE7C;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Grid pattern -->
  <g stroke="#3EAE7C" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="0" x2="1200" y2="0"/>
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="550" x2="1200" y2="550"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>

    <line x1="0" y1="0" x2="0" y2="630"/>
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
    <line x1="1200" y1="0" x2="1200" y2="630"/>
  </g>

  <!-- Faded background text -->
  <text x="600" y="380" font-family="monospace" font-size="320" font-weight="bold" fill="#3EAE7C" opacity="0.07" text-anchor="middle" dominant-baseline="middle">S</text>

  <!-- Floating accent circles -->
  <circle cx="1000" cy="100" r="180" fill="url(#accentGlow)" opacity="0.6"/>
  <circle cx="200" cy="500" r="150" fill="url(#accentGlow)" opacity="0.4"/>
  <circle cx="900" cy="550" r="120" fill="url(#accentGlow)" opacity="0.3"/>

  <!-- Central icon: Abstract eye made of concentric signal arcs -->
  <g transform="translate(600, 280)" filter="url(#glow)">
    <!-- Outer eye boundary -->
    <circle cx="0" cy="0" r="90" fill="none" stroke="#3EAE7C" stroke-width="2" opacity="0.8"/>

    <!-- Signal arcs -->
    <path d="M -60 0 Q -60 -40 0 -40 Q 60 -40 60 0" fill="none" stroke="#3EAE7C" stroke-width="2.5" opacity="0.9"/>
    <path d="M -40 0 Q -40 -25 0 -25 Q 40 -25 40 0" fill="none" stroke="#3EAE7C" stroke-width="2" opacity="0.7"/>
    <path d="M -20 0 Q -20 -10 0 -10 Q 20 -10 20 0" fill="none" stroke="#3EAE7C" stroke-width="1.5" opacity="0.6"/>

    <!-- Central pupil -->
    <circle cx="0" cy="0" r="12" fill="#3EAE7C" opacity="0.9"/>

    <!-- Inner glow -->
    <circle cx="0" cy="0" r="16" fill="none" stroke="#3EAE7C" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Title -->
  <text x="600" y="470" font-family="monospace" font-size="72" font-weight="bold" fill="white" text-anchor="middle">SOPHIS</text>

  <!-- Label -->
  <text x="600" y="520" font-family="monospace" font-size="18" fill="#71717a" text-anchor="middle" letter-spacing="2">chamomo</text>
</svg>